<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">

    <img class="main-img" src="https://images.unsplash.com/photo-1640231912426-0d5feab0b9f9?q=80&w=1200&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Equilibrium NFT">

    <h1>Equilibrium #3429</h1>

    <p class="description">
      Our Equilibrium collection promotes balance and calm.
    </p>

    <div class="info">
      <div class="price">
        <img src="icon-ethereum.svg" alt="">
        <span>0.041 ETH</span>
      </div>

      <div class="time">
        <img src="icon-clock.svg" alt="">
        <span>3 days left</span>
      </div>
    </div>

    <div class="line"></div>

    <div class="creator">
      <img class="avatar" src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=1600&q=100" alt="Jules Wyvern">
      <p>Creation of <span>Jules Wyvern</span></p>
    </div>

  </div>
</body>
</html>
