<!DOCTYPE html>

    <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">

    <img class="main-img" src="https://images.unsplash.com/photo-1640231912426-0d5feab0b9f9?q=80&w=1200&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Equilibrium NFT">

    <h1>Equilibrium #3429</h1>

    <p class="description">
      Our Equilibrium collection promotes balance and calm.
    </p>

    <div class="info">
      <div class="price">
        <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 256 417'><path fill='hsl(178,100%,50%)' d='M127.9 0L124.2 12.5V279.1L127.9 282.8L255.8 209.4L127.9 0Z'/><path fill='hsl(178,100%,50%)' d='M127.9 0L0 209.4L127.9 282.8V150.1V0Z'/><path fill='hsl(178,100%,50%)' d='M127.9 307.6L125.8 310.2V414.2L127.9 417L255.9 234.6L127.9 307.6Z'/><path fill='hsl(178,100%,50%)' d='M127.9 417V307.6L0 234.6L127.9 417Z'/></svg>" alt="icon">
        <span>0.041 ETH</span>
      </div>

      <div class="time">
        <img src="data:image/svg+xml;utf8,
  <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='hsl(215,51%,70%)' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'>
    <circle cx='12' cy='12' r='10'/>
    <polyline points='12 6 12 12 16 14'/>
  </svg>" alt="clock">
        <span>3 days left</span>
      </div>
    </div>

    <div class="line"></div>

    <div class="creator">
      <img class="avatar" src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=1600&q=100" alt="Jules Wyvern">
      <p>Creation of <span>Jules Wyvern</span></p>
    </div>
